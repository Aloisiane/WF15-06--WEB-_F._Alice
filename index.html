            <img src="image/instalogoBlanc.png" alt="Instagram" loading="lazy">
          </a>
          <a href="https://x.com/angele_vl" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
            <img src="image/TwlogoBlanc.png" alt="Twitter" loading="lazy">
          </a>
          <a href="https://www.facebook.com/angeleouenpoudre" target="_blank" rel="noopener noreferrer" aria-label="Facebook">

  </header>

  <main id="home" class="page">
    <!-- ページの主見出し（視覚的には非表示、SEO/アクセシビリティ向上） -->
    <h1 class="sr-only">アンジェル公式サイト・ホーム</h1>

    <!-- 背景の雲（アニメーション） -->
    <div class="clouds" aria-hidden="true">
      <img class="cloud c1" src="image/nuage.svg" alt="" loading="lazy">
      <img class="cloud c2" src="image/nuage2.svg" alt="" loading="lazy">
      <img class="cloud c3" src="image/nuage3.svg" alt="" loading="lazy">
      <img class="cloud c4" src="image/nuage4.svg" alt="" loading="lazy">
      <img class="cloud c5" src="image/nuage3.svg" alt="" loading="lazy">
      <img class="cloud c6" src="image/nuage2.svg" alt="" loading="lazy">
      <img class="cloud c7" src="image/nuage4.svg" alt="" loading="lazy">
      <img class="cloud c8" src="image/nuage2.svg" alt="" loading="lazy">
      <img class="cloud c9" src="image/nuage.svg" alt="" loading="lazy">
      <img class="cloud c10" src="image/nuage3.svg" alt="" loading="lazy">
    </div>

    <div class="hero">
      <section class="hero-card" aria-labelledby="hero-title">
        <div>
          <span class="chip" aria-label="最新のお知らせ">2025年ツアー発表</span>
          <h2 id="hero-title">ポップでやさしく、あかるい世界へ</h2>
          <p>アンジェル公式サイトへようこそ。最新ニュース、ライブ日程、チケット予約をチェックしよう。</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="https://www.infoconcert.com/artiste/angele-149625/concerts.html" target="_blank" rel="noopener noreferrer">コンサートを見る</a>
            <a class="btn btn-footer" href="https://www.nrj.fr/artistes/angele/actus" target="_blank" rel="noopener noreferrer">ニュースを読む</a>
          </div>
        </div>
        <div class="cover" role="img" aria-label="ライブをイメージしたビジュアル"></div>
      </section>
    </div>

    <div class="sections">
      <!-- NEWS SECTION -->
      <section id="news" class="section" aria-labelledby="news-title">
        <header>
          <h3 id="news-title">最新ニュース</h3>
          <a class="btn btn-ghost" href="https://www.infoconcert.com/artiste/angele-149625/concerts.html" target="_blank" rel="noopener noreferrer">すべてのニュース</a>
        </header>
        <div class="body">
          <div class="news-grid" id="news-grid"><!-- JSで挿入 --></div>
        </div>
      </section>

      <!-- TICKETS SECTION -->
      <section id="tickets" class="section" aria-labelledby="tickets-title">
        <header>
          <h3 id="tickets-title">チケットを購入</h3>
          <span class="price-pill" id="price-pill">—</span>
        </header>
        <div class="body">
          <form class="ticket-form" id="ticket-form" aria-describedby="tickets-desc">
            <p id="tickets-desc" class="news-meta">都市と日付を選んでください。</p>

            <div class="field">
              <label class="label" for="event">都市・会場</label>
              <select id="event" name="event" required aria-required="true"></select>
            </div>

            <div class="field">
              <label class="label" for="date">日付</label>
              <input id="date" name="date" type="date" required aria-required="true">
            </div>

            <div class="field">
              <label class="label" for="qty">枚数</label>
              <div class="control">
                <input id="qty" name="qty" type="number" min="1" max="6" value="2">
                <span class="selectlike" id="seat-cat" role="listbox" aria-label="カテゴリー">カテゴリー：スタンディング</span>
              </div>
            </div>

            <div class="total">
              <span>合計</span>
              <strong id="total">—</strong>
            </div>

            <button class="btn btn-primary" type="submit">今すぐ予約</button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <footer aria-label="フッター">
    <div class="footer-card">
      <p>© <span id="year"></span> アンジェル. All rights reserved.</p>

        </a>
        <a href="https://www.instagram.com/angele_vl" target="_blank" rel="noopener noreferrer" aria-label="Instagram">

        </a>
        <a href="https://x.com/angele_vl" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
          <img src="image/TwlogoBleuClair.png" alt="Twitter" loading="lazy">
        </a>
        <a href="https://www.facebook.com/angeleouenpoudre" target="_blank" rel="noopener noreferrer" aria-label="Facebook">

        <a href="https://www.tiktok.com/@angele_vl" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <img src="image/TikToklogoBleuClair.png" alt="TikTok" loading="lazy">

    </div>

    <img src="image/Angele.png" alt="アンジェル" class="footer-image" loading="lazy">
